<!DOCTYPE html>
<html>

<head>

    <title>URL Shortener</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>URL Shortener simple</h1>

        <input
            type="text"
            id="longUrl"
            placeholder="Enter long URL"
        >

        <button onclick="shortenUrl()">
            Shorten URL
        </button>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
